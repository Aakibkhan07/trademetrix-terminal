_format_version: "2.1"

services:
  - name: auth
    url: http://supabase-auth:9999
    routes:
      - name: auth-all
        paths:
          - /auth/v1
    plugins:
      - name: cors
        config:
          origins:
            - http://localhost:3000
          methods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
          headers:
            - Content-Type
            - Authorization
            - apikey
          exposed_headers:
            - Content-Range
            - X-Total-Count
          credentials: true

  - name: rest
    url: http://supabase-rest:3000
    routes:
      - name: rest-all
        paths:
          - /rest/v1
    plugins:
      - name: cors

  - name: realtime
    url: http://supabase-realtime:4000
    routes:
      - name: realtime-all
        paths:
          - /realtime/v1

  - name: storage
    url: http://supabase-storage:5000
    routes:
      - name: storage-all
        paths:
          - /storage/v1
