x-healthcheck: &healthcheck
  interval: 10s
  timeout: 5s
  retries: 5
  start_period: 15s

services:
  redis:
    image: redis:7-alpine
    container_name: trademetrix_redis
    restart: unless-stopped
    networks:
      - trademetrix
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis-data:/data

  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    container_name: trademetrix_api
    restart: unless-stopped
    networks:
      - trademetrix
    env_file: ../../apps/api/.env
    environment:
      ENV: production
      DEBUG: "True"
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: https://ai.trademetrix.tech
      LOG_LEVEL: INFO
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      <<: *healthcheck

  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
    container_name: trademetrix_web
    restart: unless-stopped
    networks:
      - trademetrix
    env_file: ../../apps/web/.env
    environment:
      NEXT_PUBLIC_API_URL: https://api.ai.trademetrix.tech/api/v1
      NEXT_PUBLIC_WS_URL: wss://api.ai.trademetrix.tech/api/v1/marketdata/ws
      HOSTNAME: 0.0.0.0
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://127.0.0.1:3000/"]
      <<: *healthcheck

  caddy:
    image: caddy:2-alpine
    container_name: trademetrix_caddy
    restart: unless-stopped
    networks:
      - trademetrix
    dns:
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config

  prometheus:
    image: prom/prometheus:latest
    container_name: trademetrix_prometheus
    restart: unless-stopped
    networks:
      - trademetrix
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"

  grafana:
    image: grafana/grafana:latest
    container_name: trademetrix_grafana
    restart: unless-stopped
    networks:
      - trademetrix
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_SERVER_ROOT_URL: https://monitor.ai.trademetrix.tech
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

networks:
  trademetrix:
    driver: bridge

volumes:
  redis-data:
  caddy-data:
  caddy-config:
  prometheus-data:
  grafana-data:
