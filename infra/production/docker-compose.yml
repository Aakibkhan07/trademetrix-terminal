x-healthcheck: &healthcheck
  interval: 10s
  timeout: 5s
  retries: 5
  start_period: 15s

services:
  redis:
    image: redis:7-alpine
    container_name: trademetrix_redis
    restart: unless-stopped
    networks:
      - trademetrix
    mem_limit: 256m
    cpus: 0.5
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis-data:/data
      - ../redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: ["redis-server", "/usr/local/etc/redis/redis.conf", "--protected-mode", "no"]

  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    container_name: trademetrix_api
    restart: unless-stopped
    networks:
      - trademetrix
    env_file: ../../apps/api/.env
    environment:
      ENV: production
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: https://ai.trademetrix.tech
      COOKIE_DOMAIN: .trademetrix.tech
      LOG_LEVEL: INFO
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    mem_limit: 768m
    cpus: 2.0
    ports:
      - "127.0.0.1:8000:8000"
    security_opt:
      - no-new-privileges:true
    labels:
      - "autoheal=true"

  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
    container_name: trademetrix_web
    restart: unless-stopped
    networks:
      - trademetrix
    env_file: ../../apps/web/.env
    environment:
      NEXT_PUBLIC_API_URL: https://api.ai.trademetrix.tech/api/v1
      NEXT_PUBLIC_WS_URL: wss://api.ai.trademetrix.tech/api/v1/marketdata/ws
      HOSTNAME: 0.0.0.0
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    mem_limit: 512m
    cpus: 1.0
    security_opt:
      - no-new-privileges:true

  caddy:
    image: caddy:2-alpine
    container_name: trademetrix_caddy
    restart: unless-stopped
    networks:
      - trademetrix
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    mem_limit: 128m
    cpus: 0.5

  prometheus:
    image: prom/prometheus:latest
    container_name: trademetrix_prometheus
    restart: unless-stopped
    networks:
      - trademetrix
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
      - ../prometheus/alerts:/etc/prometheus/alerts:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    mem_limit: 512m
    cpus: 0.5

  grafana:
    image: grafana/grafana:latest
    container_name: trademetrix_grafana
    restart: unless-stopped
    networks:
      - trademetrix
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_SERVER_ROOT_URL: https://monitor.ai.trademetrix.tech
      GF_INSTALL_PLUGINS: "grafana-piechart-panel"
    volumes:
      - grafana-data:/var/lib/grafana
      - ../grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ../grafana/datasources:/etc/grafana/provisioning/datasources:ro
    mem_limit: 256m
    cpus: 0.5
    depends_on:
      - prometheus

  market-agent:
    build:
      context: ../../apps/market-agent
      dockerfile: Dockerfile
    container_name: trademetrix_market_agent
    restart: unless-stopped
    networks:
      - trademetrix
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      SYMBOLS: "NSE:NIFTY50-INDEX,BSE:SENSEX-INDEX"
      LOG_LEVEL: INFO
    depends_on:
      redis:
        condition: service_healthy
    mem_limit: 256m
    cpus: 0.5

  autoheal:
    image: willfarrell/autoheal:latest
    container_name: trademetrix_autoheal
    restart: unless-stopped
    networks: []
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      AUTOHEAL_CONTAINER_LABEL: autoheal
      AUTOHEAL_INTERVAL: 30
      AUTOHEAL_START_PERIOD: 60
    mem_limit: 32m
    cpus: 0.1

  node-exporter:
    image: prom/node-exporter:latest
    container_name: trademetrix_node_exporter
    restart: unless-stopped
    networks:
      - trademetrix
    ports:
      - "127.0.0.1:9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    mem_limit: 128m
    cpus: 0.2

networks:
  trademetrix:
    driver: bridge

volumes:
  redis-data:
  caddy-data:
  caddy-config:
  prometheus-data:
  grafana-data:
