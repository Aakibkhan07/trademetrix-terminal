x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-healthcheck: &healthcheck
  interval: 15s
  timeout: 5s
  retries: 3
  start_period: 20s

services:
  redis:
    image: redis:7-alpine
    container_name: trademetrix_redis
    restart: unless-stopped
    networks: [trademetrix]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis-data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    logging: *default-logging
    mem_limit: 256m
    mem_reservation: 128m
    cpus: 0.5

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    container_name: trademetrix_api
    restart: unless-stopped
    networks: [trademetrix]
    env_file: ./.env.production
    environment:
      ENV: production
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      <<: *healthcheck
    logging: *default-logging
    mem_limit: 512m
    mem_reservation: 256m
    cpus: 1.0
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    container_name: trademetrix_web
    restart: unless-stopped
    networks: [trademetrix]
    env_file: ./.env.production
    environment:
      HOSTNAME: 0.0.0.0
    depends_on:
      api: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/"]
      <<: *healthcheck
    logging: *default-logging
    mem_limit: 512m
    mem_reservation: 256m
    cpus: 1.0
    security_opt:
      - no-new-privileges:true

  nginx:
    image: nginx:1.27-alpine
    container_name: trademetrix_nginx
    restart: unless-stopped
    networks: [trademetrix]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/templates:/etc/nginx/templates:ro
      - nginx-cache:/var/cache/nginx
      - certbot-data:/etc/letsencrypt
      - certbot-logs:/var/log/letsencrypt
    depends_on:
      - api
      - web
    logging: *default-logging
    mem_limit: 128m
    mem_reservation: 64m
    cpus: 0.5

  certbot:
    image: certbot/certbot
    container_name: trademetrix_certbot
    restart: unless-stopped
    networks: [trademetrix]
    volumes:
      - certbot-data:/etc/letsencrypt
      - certbot-logs:/var/log/letsencrypt
    entrypoint: ""
    command: >
      sh -c "
      trap exit TERM;
      while true; do
        certbot renew --quiet --no-self-upgrade;
        sleep 86400;
      done
      "
    depends_on:
      - nginx

  prometheus:
    image: prom/prometheus:latest
    container_name: trademetrix_prometheus
    restart: unless-stopped
    networks: [trademetrix]
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.console.libraries=/etc/prometheus"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
    logging: *default-logging
    mem_limit: 512m
    mem_reservation: 256m
    cpus: 0.5

  grafana:
    image: grafana/grafana:latest
    container_name: trademetrix_grafana
    restart: unless-stopped
    networks: [trademetrix]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_SERVER_ROOT_URL: ${GRAFANA_URL:-https://monitor.ai.trademetrix.tech}
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_INSTALL_PLUGINS: "grafana-piechart-panel"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on: [prometheus]
    logging: *default-logging
    mem_limit: 256m
    mem_reservation: 128m
    cpus: 0.5

  node-exporter:
    image: prom/node-exporter:latest
    container_name: trademetrix_node_exporter
    restart: unless-stopped
    networks: [trademetrix]
    ports:
      - "127.0.0.1:9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    logging: *default-logging
    mem_limit: 128m
    mem_reservation: 64m
    cpus: 0.2

networks:
  trademetrix:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  redis-data:
  nginx-cache:
  certbot-data:
  certbot-logs:
  prometheus-data:
  grafana-data:
