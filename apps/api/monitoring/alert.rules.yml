groups:
  - name: trademetrix_alerts
    rules:
      # High error rate on any API endpoint
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High HTTP 5xx error rate ({{ $value | humanizePercentage }})"

      # Broker API latency spike
      - alert: HighBrokerLatency
        expr: histogram_quantile(0.95, rate(broker_request_duration_seconds_bucket[5m])) > 5.0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Broker API p95 latency > 5s"

      # Circuit breaker open
      - alert: CircuitBreakerOpen
        expr: circuit_breaker_state > 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Circuit breaker {{ $labels.breaker }} is open"

      # High broker failure rate
      - alert: HighBrokerFailureRate
        expr: rate(broker_requests_failure_total[5m]) / rate(broker_requests_success_total[5m] + broker_requests_failure_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Broker {{ $labels.broker }} failure rate > 10%"

      # Process memory high
      - alert: HighMemoryUsage
        expr: process_memory_bytes{type="rss"} > 500 * 1024 * 1024
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Process RSS memory > 500MB"

      # Too many reconnects
      - alert: ExcessiveBrokerReconnects
        expr: rate(market_ticks_reconnects_total[5m]) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Broker {{ $labels.broker }} reconnecting > 5 times per 5 minutes"

      # Application down
      - alert: InstanceDown
        expr: up{job="trademetrix-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "API instance {{ $labels.instance }} is down"
