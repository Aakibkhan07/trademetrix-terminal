name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  lint-api:
    name: Lint API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install ruff
      - run: ruff check .

  test-api:
    name: Test API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements.txt
      - run: pip install pytest pytest-asyncio httpx
      - name: Run tests
        run: pytest tests/ -v --asyncio-mode=auto
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'http://localhost:54321' }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY || 'test-key' }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || 'test-key' }}
          SECRET_KEY: test-secret-key-for-testing-only
          ENCRYPTION_KEY: ZTtsuGQCgigNHKjnANV_FyTsMqZuRKPOCyYK8nps7x0=

  lint-web:
    name: Lint Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run lint

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test-key
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
          NEXT_PUBLIC_WS_URL: ws://localhost:8000/api/v1/marketdata/ws

  docker:
    name: Build Docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose -f infra/docker-compose.yml build api web

  backup-verify:
    name: Verify Backup Scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash -n apps/api/scripts/backup.sh
      - run: bash -n apps/api/scripts/restore.sh

  load-test:
    name: Load Test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: grafana/setup-k6-action@v1
      - name: Start API server
        run: |
          cd apps/api
          pip install -r requirements.txt
          SUPABASE_URL=http://localhost:54321 \
          SUPABASE_SERVICE_KEY=test-key \
          SUPABASE_ANON_KEY=test-key \
          SECRET_KEY=test-secret-key \
          ENCRYPTION_KEY=ZTtsuGQCgigNHKjnANV_FyTsMqZuRKPOCyYK8nps7x0= \
          uvicorn main:app --host 0.0.0.0 --port 8000 &
          sleep 5
      - name: Run API load tests
        run: |
          API_URL=http://localhost:8000 k6 run load-tests/api.js \
            --vus 10 --duration 30s
      - name: Cleanup
        run: kill %1 || true
